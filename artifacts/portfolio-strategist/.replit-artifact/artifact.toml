kind = "web"
previewPath = "/"
title = "AI Portfolio Strategist"
version = "1.0.0"
id = "artifacts/portfolio-strategist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22781

[services.development]
run = "pnpm --filter @workspace/portfolio-strategist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-strategist", "run", "build" ]
publicDir = "artifacts/portfolio-strategist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22781"
BASE_PATH = "/"
